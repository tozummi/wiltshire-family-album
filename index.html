<!DOCTYPE html>
<html lang="en">

<head>
  <!-- ======================================================
       BASIC PAGE SETTINGS
  ======================================================= -->

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <title>Wiltshire Family Album</title>


  <!-- ======================================================
       STYLESHEET
  ======================================================= -->

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

  <!-- ======================================================
       MAIN PAGE CONTAINER
  ======================================================= -->

  <div class="container">

    <h1>
      🌿 Wiltshire Family Album
    </h1>


    <!-- ====================================================
         PIN LOGIN
    ===================================================== -->

    <div id="login-box">

      <p>
        Enter family code
      </p>

      <div class="pin-wrapper">

        <input
          id="pin"
          type="password"
          placeholder="PIN"
        >

        <button
          type="button"
          onclick="togglePin()"
          aria-label="Show or hide PIN"
        >
          👁️
        </button>

      </div>

      <button
        type="button"
        onclick="checkPin()"
      >
        Enter
      </button>

    </div>


    <!-- ====================================================
         FAMILY MEMBER SELECTION
    ===================================================== -->

    <div
      id="name-selection"
      style="display: none;"
    >

      <h2>
        Who's using the album?
      </h2>

      <div id="family-list"></div>

      <button
        id="continue-btn"
        type="button"
        disabled
      >
        Continue
      </button>

    </div>


    <!-- ====================================================
         ALBUM AREA
    ===================================================== -->

    <div
      id="album"
      style="display: none;"
    >

      <h2 id="welcome-message"></h2>

      <button
        id="logout-btn"
        type="button"
      >
        Log out
      </button>


      <!-- Photo file input is opened by the upload button -->

      <!-- Photos and videos are selected through this hidden input -->
      
      <input
        id="media-input"
        type="file"
        accept="image/*,video/*"
        multiple
        hidden
      >
      
      <button
        id="upload-btn"
        type="button"
      >
        Upload Photos or Videos 📸🎥
      </button>

      <!-- Uploaded photos are inserted here by script.js -->

      <div id="gallery"></div>

    </div>

  </div>


  <!-- ======================================================
       TOAST NOTIFICATIONS
  ======================================================= -->

  <div id="toast"></div>


  <!-- ======================================================
       DELETE CONFIRMATION MODAL
  ======================================================= -->

  <div
    id="delete-confirm-modal"
    class="delete-confirm-modal"
    hidden
  >

    <div class="delete-confirm-box">

      <div class="delete-confirm-icon">
        🗑️
      </div>

      <h3>
        Delete this photo?
      </h3>

      <p>
        This photo will be permanently removed
        from the family album.
      </p>

      <div class="delete-confirm-actions">

        <button
          id="cancel-delete-btn"
          type="button"
        >
          Keep photo
        </button>

        <button
          id="confirm-delete-btn"
          type="button"
        >
          Delete permanently
        </button>

      </div>

    </div>

  </div>


  <!-- ======================================================
       PHOTO VIEWER
  ======================================================= -->

  <div
    id="photo-viewer"
    class="photo-viewer"
    hidden
  >


    <!-- Viewer controls -->

    <button
      id="close-viewer"
      type="button"
      aria-label="Close photo"
    >
      &times;
    </button>

    <button
      id="delete-photo-btn"
      type="button"
      aria-label="Delete photo"
      hidden
    >
      🗑️
    </button>


    <!-- Full-size photo -->

    <img
      id="viewer-image"
      alt=""
    >


    <!-- Photo information and controls -->

    <div id="viewer-details">

      <div>


        <!-- ================================================
             PHOTO REACTIONS
        ================================================= -->

        <div
          id="reaction-bar"
          class="reaction-bar"
        >

          <button
            type="button"
            data-reaction="love"
            aria-label="Love"
          >
            <span class="reaction-emoji">
              ❤️
            </span>

            <span class="reaction-count">
              0
            </span>
          </button>


          <button
            type="button"
            data-reaction="funny"
            aria-label="Funny"
          >
            <span class="reaction-emoji">
              😂
            </span>

            <span class="reaction-count">
              0
            </span>
          </button>


          <button
            type="button"
            data-reaction="beautiful"
            aria-label="Beautiful"
          >
            <span class="reaction-emoji">
              😍
            </span>

            <span class="reaction-count">
              0
            </span>
          </button>


          <button
            type="button"
            data-reaction="aww"
            aria-label="Aww"
          >
            <span class="reaction-emoji">
              🥹
            </span>

            <span class="reaction-count">
              0
            </span>
          </button>


          <button
            type="button"
            data-reaction="like"
            aria-label="Like"
          >
            <span class="reaction-emoji">
              👍
            </span>

            <span class="reaction-count">
              0
            </span>
          </button>

        </div>


        <!-- ================================================
             CAPTION CONTROLS
        ================================================= -->

        <button
          id="edit-caption-btn"
          type="button"
          hidden
        >
          Add caption
        </button>

        <div
          id="caption-editor"
          hidden
        >

          <textarea
            id="caption-input"
            maxlength="200"
            placeholder="Write a caption..."
          ></textarea>

          <div class="caption-actions">

            <button
              id="cancel-caption-btn"
              type="button"
            >
              Cancel
            </button>

            <button
              id="save-caption-btn"
              type="button"
            >
              Save
            </button>

          </div>

        </div>


        <!-- ================================================
             PHOTO DETAILS
        ================================================= -->

        <span id="viewer-uploader"></span>

        <p id="viewer-caption"></p>

      </div>

      <span id="viewer-date"></span>

    </div>

  </div>


  <!-- ======================================================
       EXTERNAL LIBRARIES
  ======================================================= -->

  <script
    src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
  ></script>

  <script
    src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"
  ></script>


  <!-- ======================================================
       APP SCRIPTS

       config.js must load before script.js because script.js
       uses the settings defined inside config.js.
  ======================================================= -->

  <script src="config.js"></script>
  <script src="script.js"></script>

</body>

</html>
