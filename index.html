<!DOCTYPE html>
<html>
<head>
  <title>Wiltshire Family Album</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>🌿 Wiltshire Family Album</h1>

    <div id="login-box">
      <p>Enter family code</p>

      <div class="pin-wrapper">
        <input id="pin" type="password" placeholder="PIN">

        <button type="button" onclick="togglePin()">
          👁️
        </button>
      </div>

      <button onclick="checkPin()">
        Enter
      </button>
    </div>

    <div id="name-selection" style="display: none;">
      <h2>Who's using the album?</h2>

      <div id="family-list"></div>

      <button id="continue-btn" disabled>
        Continue
      </button>
    </div>

    <div id="album" style="display: none;">
      <h2 id="welcome-message"></h2>

      <input
        type="file"
        id="photo-input"
        accept="image/*"
        multiple
        hidden
      >

      <button id="upload-btn">
        Upload Photo 📸
      </button>

      <div id="gallery"></div>
    </div>

  </div>

  <div id="toast"></div>
  
  <div id="photo-viewer" class="photo-viewer" hidden>
    <button
      id="close-viewer"
      type="button"
      aria-label="Close photo"
    >
      &times;
    </button>

    <img id="viewer-image" alt="">
    <div id="viewer-details">
  <div>
    <button id="edit-caption-btn" type="button" hidden>
  Add caption
    </button>
    <div id="caption-editor" hidden>
  <textarea
    id="caption-input"
    maxlength="200"
    placeholder="Write a caption..."
  ></textarea>

  <div class="caption-actions">
    <button id="cancel-caption-btn" type="button">
      Cancel
    </button>

    <button id="save-caption-btn" type="button">
      Save
    </button>
  </div>
    </div>
    <span id="viewer-uploader"></span>
    <p id="viewer-caption"></p>
  </div>

  <span id="viewer-date"></span>
</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="script.js"></script>

</body>
</html>
